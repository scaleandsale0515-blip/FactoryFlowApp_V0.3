workflows:
  factoryflow-v3:
    name: FactoryFlow V3 Build
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.factoryflow.app"
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build APK (debug - no signing needed)
        script: |
          flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
